        t.className = 'stats-tab' + (i === _statsTab ? ' active' : '');
        t.textContent = label;
        if (SESSION.active && i > 0) t.style.setProperty('--tab-color', SESSION.players[i - 1].color);
        t.addEventListener('click', e => { e.stopPropagation(); _statsTab = i; refreshStatsView(); });
        tabBar.appendChild(t);
    });
}
function refreshStatsView() {
    buildStatsTabs();
    if (_statsTab === 0) {
        document.getElementById('statsTotal').textContent = totalRolls > 0 ? `${totalRolls} roll${totalRolls === 1 ? '' : 's'}` : 'No rolls yet';
        document.getElementById('statsMeta').textContent = sessionStartTime && Date.now() - sessionStartTime > 0 ? `${formatTime(Date.now() - sessionStartTime)} this session` : '';
        renderStatsBars(sessionRolls, currentMode.accent);
        const fb2 = document.getElementById('statsFinishBtn'); if (fb2) fb2.style.display = 'none';
    } else {
        const p = SESSION.players[_statsTab - 1]; if (!p) return;
        const rolls = p.rolls || [0, 0, 0, 0, 0, 0];
        document.getElementById('statsTotal').textContent = p.rollCount > 0 ? `${p.rollCount} roll${p.rollCount === 1 ? '' : 's'}` : 'No rolls yet';
        document.getElementById('statsMeta').textContent = p.sixCount > 0 ? `${p.sixCount} six${p.sixCount === 1 ? '' : 'es'} · ${Math.round(p.sixCount / p.rollCount * 100)}% six rate` : '';
        renderStatsBars(rolls, SESSION.players[_statsTab - 1].color);
        let finBtn = document.getElementById('statsFinishBtn');
        if (!finBtn) {
            finBtn = document.createElement('div');
            finBtn.id = 'statsFinishBtn';
            (statsOverlay.querySelector('.stats-scroll-body') || statsOverlay).appendChild(finBtn);
        }
        const pIdx = _statsTab - 1;
        const pColor = SESSION.players[pIdx]?.color || '#ffffff';
        if (SESSION.active && SESSION.players[pIdx]) {
            if (SESSION.players[pIdx].finished) {
                finBtn.className = 'stats-finish-btn stats-finish-done';
                finBtn.textContent = '🏁 Finished';
                finBtn.onclick = null;
            } else {
                finBtn.className = 'stats-finish-btn';
                finBtn.style.setProperty('--fin-color', pColor);
                finBtn.textContent = '🏁 Mark as Finished';
                finBtn.onclick = e => {
                    e.stopPropagation();
                    markPlayerFinished(pIdx);
                    refreshStatsView();
                };
            }
            finBtn.style.display = '';
        } else {
            finBtn.style.display = 'none';
        }
    }
    // Version label
    const verEl = document.getElementById('statsVersion');
    if (verEl) verEl.textContent = `v${APP_VERSION}`;
}
function showStats() {
    if (!currentMode) return;
    _statsTab = 0;
    const b = currentMode.badge, tag = document.getElementById('statsModeTag');
    tag.textContent = currentMode.label; tag.style.background = b.bg; tag.style.color = b.color; tag.style.border = `1px solid ${b.border}`;
    const hdRow = document.getElementById('statsHistoryDepth');
    if (hdRow) {
        hdRow.innerHTML = '';
        const lbl = document.createElement('span'); lbl.className = 'stats-row-label'; lbl.textContent = 'History';
        hdRow.appendChild(lbl);
        const pills = document.createElement('div'); pills.className = 'stats-hd-pills';
        [0, 1, 2, 3, 5].forEach(n => {
            const p = document.createElement('div');
            p.className = 'stats-hd-pill' + (historyDepth === n ? ' active' : '');
            p.textContent = n === 0 ? 'Off' : String(n);
            p.addEventListener('click', e => {
                e.stopPropagation();
                historyDepth = n; lsSet('historyDepth', String(n));
                rollHistory = []; historyRow.innerHTML = '';
                hdRow.querySelectorAll('.stats-hd-pill').forEach(x => x.classList.remove('active'));
                p.classList.add('active');
            });
            pills.appendChild(p);
        });
        hdRow.appendChild(pills);
    }
    statsOverlay.classList.add('visible');
    refreshStatsView();
}
function hideStats() { statsOverlay.classList.remove('visible'); }
statsOverlay.addEventListener('click', e => {
    if (e.target.closest('#statsMuteRow,#statsChangeMode,#statsSpecialDice,.stats-tab-bar')) return;
    hideStats();
});
statsChangeMode.addEventListener('click', e => {
    e.stopPropagation(); hideStats();
    EDGE_CONFIGS.forEach(cfg => { const el = document.getElementById(cfg.edgeEl); if (el) el.classList.remove('visible', 'active', 'chain'); });
    sessionRolls = [0, 0, 0, 0, 0, 0]; totalRolls = 0; recentRollsGlobal = [];
    rollHistory = []; historyRow.innerHTML = ''; rollCounterEl.style.opacity = '0';
    streakCount = 0; currentMode = null; hideHalo(); hideCardFace(); enterSelection();
});

document.getElementById('statsSpecialDice')?.addEventListener('click', e => { e.stopPropagation(); hideStats(); showGallery(); });


// ── RITUAL / FOOL REVEAL ──
function handleRitualReveal(e) {
    if (e) e.stopPropagation();
    if (ritualPending !== null) {
        const { result: r, special: spec } = ritualPending;
        ritualPending = null;
        ritualOverlay.classList.remove('visible');
        const _rSym = document.querySelector('.ritual-symbol');
        if (_rSym) { _rSym.textContent = '❖'; _rSym.style.fontSize = ''; }
        if (spec) {
            if (spec.delayedReveal) { resolveResult(r, null, { ...spec, sfxFn: null }); }
            else { showAnnounce(typeof spec.announcement === 'function' ? spec.announcement(r) : (spec.announcement || spec.label), spec.announcementColor); resolveResult(r, null, spec); }
        } else { resolveResult(r, null, null); }
    } else if (foolPending !== null) {
        const fp = foolPending; foolPending = null;
        ritualOverlay.classList.remove('visible');
        const rSym = document.querySelector('.ritual-symbol');
        if (rSym) { rSym.textContent = '❖'; rSym.style.fontSize = ''; }
        resolveResult(fp.result, fp.squishClass, fp.special ? { ...fp.special, sfxFn: null } : null);
    }
}
ritualOverlay.addEventListener('click', handleRitualReveal);
ritualOverlay.addEventListener('touchend', e => { e.preventDefault(); handleRitualReveal(e); }, { passive: false });

// ── SPECIAL DICE GALLERY ──
function dgWithAlpha(colorStr, alpha) {
    const m = colorStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
    if (m) return `rgba(${m[1]},${m[2]},${m[3]},${alpha})`;
    return colorStr;
}
function buildGallery() {
    const container = document.getElementById('galleryList');
    container.innerHTML = ''; container.className = 'dg-grid';
    Object.values(SPECIAL_DICE).forEach((die, cardIdx) => {
        const enabled = isDiceEnabled(die.id);
        const bgColor = die.galleryColor || '#1a1a22';
        const glowColor = die.announcementColor || 'rgba(200,200,200,1)';
        const card = document.createElement('div');
        card.className = 'dg-card' + (enabled ? '' : ' dg-disabled');
        const dieEl = document.createElement('div');
        dieEl.className = 'dg-die';
        if (die.alwaysSix && enabled) dieEl.classList.add('dg-die-six');
        if (die.id === 'glitch' && enabled) dieEl.classList.add('dg-die-glitch');
        if (die.frozenDots) dieEl.classList.add('dg-die-frozen');
        dieEl.style.backgroundColor = bgColor;
        if (die.sharpCorners) dieEl.style.borderRadius = '10px';
        if (die.dieRadius) dieEl.style.borderRadius = die.dieRadius;
        if (enabled) {
            dieEl.style.boxShadow = `0 8px 22px rgba(0,0,0,.6),inset 0 -5px 0 rgba(0,0,0,.2),inset 0 5px 8px rgba(255,255,255,.18),0 0 20px ${dgWithAlpha(typeof glowColor === 'function' ? 'rgba(200,200,200,1)' : glowColor, 0.22)}`;
            dieEl.style.animationDelay = (cardIdx * 0.38) + 's';
        }
        const pat = die.dotPattern || (patterns[die.face] || []);
        for (let i = 1; i <= 9; i++) {
            const dot = document.createElement('div'); dot.className = 'dg-dot';
            const isLit = pat.includes(i);
            dot.style.opacity = isLit ? (die.frozenDots ? '0.15' : '1') : '0';
            if (isLit && die.keepDiamond) { dot.style.borderRadius = '2px'; dot.style.transform = 'rotate(45deg)'; dot.style.background = '#FFD045'; }
            if (isLit && die.historyDotColor && !die.keepDiamond) dot.style.background = die.historyDotColor;
            dieEl.appendChild(dot);
        }
        if (die.id === 'the_fool') {
            const ov = document.createElement('div'); ov.className = 'dg-overlay-txt'; ov.textContent = '?'; dieEl.appendChild(ov);
        }
        const label = document.createElement('div'); label.className = 'dg-label';
        label.textContent = die.label;
        if (enabled) label.style.color = typeof glowColor === 'function' ? 'rgba(200,200,200,1)' : glowColor;
        const desc = document.createElement('div'); desc.className = 'dg-desc'; desc.textContent = die.desc || '';
        card.appendChild(dieEl); card.appendChild(label); card.appendChild(desc);
        card.dataset.dieId = die.id;
        card.addEventListener('click', e => {
            e.stopPropagation();
            const nowEnabled = !isDiceEnabled(die.id);
            setDiceEnabled(die.id, nowEnabled);
            card.classList.toggle('dg-disabled', !nowEnabled);
            const de = card.querySelector('.dg-die');
            if (de) de.style.filter = nowEnabled ? '' : 'grayscale(1) brightness(0.6)';
            const lb = card.querySelector('.dg-label');
            if (lb) lb.style.color = nowEnabled ? (typeof die.announcementColor === 'function' ? 'rgba(200,200,200,1)' : (die.announcementColor || 'rgba(255,255,255,.55)')) : '';
        });
        container.appendChild(card);
    });
}
function showGallery() { buildGallery(); document.getElementById('specialGallery').classList.add('visible'); }
function hideGallery() { document.getElementById('specialGallery').classList.remove('visible'); }
document.getElementById('galleryClose').addEventListener('click', e => { e.stopPropagation(); hideGallery(); });
document.getElementById('specialGallery').addEventListener('click', e => { if (e.target === document.getElementById('specialGallery')) hideGallery(); });

// ── SESSION SETUP ──
let _ssCount = 1, _ssNames = ['Red', 'Blue', 'Green', 'Yellow'];

function showSessionSetup() {
    _ssCount = 1;
    _ssNames = ['Red', 'Blue', 'Green', 'Yellow'];
    buildSSCountRow();
    buildSSPlayers();

    // Remove any existing continue block
    const existing = document.getElementById('ssContinueBlock');
    if (existing) existing.remove();

    // Check for a valid snapshot
    const snap = loadSnapshot();
    if (snap && snap.playerCount >= 2 && MODES[snap.modeId]) {
        _buildContinueBlock(snap);
    }

    sessionSetup.classList.add('visible');
}

function _buildContinueBlock(snap) {
    const mode = MODES[snap.modeId];
    const names = snap.players.map(p => p.name).join(', ');
    const minsAgo = Math.round((Date.now() - snap.ts) / 60000);
    const timeStr = minsAgo < 1 ? 'just now' : `${minsAgo}m ago`;

    const block = document.createElement('div');
    block.id = 'ssContinueBlock';
    block.className = 'ss-continue-block';

    const btn = document.createElement('div');
    btn.className = 'ss-continue-btn';
    btn.innerHTML = `
        <span class="ss-continue-title">Continue</span>
        <span class="ss-continue-meta">${names}</span>
        <span class="ss-continue-sub">${mode.label} · ${snap.totalRolls} rolls · ${timeStr}</span>
    `;

    const orRow = document.createElement('div');
    orRow.className = 'ss-or-row';
    orRow.textContent = '— or start fresh —';

    block.appendChild(btn);
    block.appendChild(orRow);

    // Insert before the Begin button
    const ssBegin = document.getElementById('ssBegin');
    sessionSetup.insertBefore(block, ssBegin);

    btn.addEventListener('click', () => {
        hideSessionSetup();
        restoreSnapshot(snap);
        const modeObj = MODES[snap.modeId];
        if (!modeObj) { enterSelection(); return; }
        currentMode = modeObj;
        _setupModeVisuals(modeObj, true /* resumed */);
        if (modeObj.jackaroo) {
            jackReset();
            if (snap.jackDrawn) jackDrawn = snap.jackDrawn;
            updateJackCounter();
        } else {
            hideCardFace();
        }
    });
}

function hideSessionSetup() { sessionSetup.classList.remove('visible'); }

function _setupModeVisuals(m, resumed) {
    dice.className = 'dice';
    void dice.offsetWidth;
    dice.style.animation = ''; dice.style.boxShadow = ''; dice.style.borderRadius = '';
    dice.style.backgroundColor = rollColors[0];
    showDots(6);

    setAmbientTargetSpeed(m.bgSpeedS);
    dice.style.setProperty('--idle-dur', (m.bgSpeedS / 6.5).toFixed(1) + 's');
    if (m.cursed) { cursedSaturation = 100; startCursedBeat(); } else stopCursedBeat();
    animateGradTo(m.id === 'jackaroo' ? GRAD_JACK : m.cursed ? GRAD_CURSED : GRAD_NEUTRAL, 1200);

    applyModeBadge(m, resumed);

    // Flash edge bars so players know whose turn it is
    setTimeout(() => {
        renderEdgeBars();
        setActiveEdge(SESSION.currentIndex);
    }, 350);

    requestAnimationFrame(() => { void dice.offsetWidth; dice.classList.add('idle'); });
}

function buildSSCountRow() {
    document.querySelectorAll('.ss-count-btn').forEach(btn => {
        const n = parseInt(btn.dataset.n);
        btn.classList.toggle('active', n === _ssCount);
        btn.onclick = () => { _ssCount = n; buildSSCountRow(); buildSSPlayers(); };
    });
}

function buildSSPlayers() {
    const wrap = document.getElementById('ssPlayers'); wrap.innerHTML = '';
    if (_ssCount === 1) { wrap.innerHTML = '<div class="ss-solo-label">Solo — no turn tracking</div>'; return; }
    for (let i = 0; i < _ssCount; i++) {
        const cfg = PLAYER_CONFIGS[i];
        const r = parseInt(cfg.color.slice(1, 3), 16), g = parseInt(cfg.color.slice(3, 5), 16), b = parseInt(cfg.color.slice(5, 7), 16);
        const card = document.createElement('div'); card.className = 'ss-player-card';
        card.style.setProperty('--pc', cfg.color);
        card.style.background = `rgba(${r},${g},${b},0.10)`; card.style.borderColor = `rgba(${r},${g},${b},0.30)`;
        const dot = document.createElement('div'); dot.className = 'ss-player-dot-pill';
        dot.style.background = cfg.color; dot.style.boxShadow = `0 0 8px 2px rgba(${r},${g},${b},0.55)`;
        const inp = document.createElement('input'); inp.className = 'ss-player-name-inp';
        inp.maxLength = 8; inp.value = _ssNames[i] || cfg.colorName;
        inp.style.setProperty('--pc', cfg.color);
        inp.addEventListener('input', () => { _ssNames[i] = inp.value || cfg.colorName; });
        inp.addEventListener('focus', () => { if (audioCtx?.state === 'suspended') audioCtx.resume(); });
        // Pencil icon to surface rename affordance
        const pencil = document.createElement('span'); pencil.className = 'ss-pencil'; pencil.textContent = '✎';
        card.appendChild(dot); card.appendChild(inp); card.appendChild(pencil); wrap.appendChild(card);
    }
}
document.getElementById('ssBegin').addEventListener('click', () => {
    lsSet('lastSessionCount', String(_ssCount));
    lsSet('lastSessionNames', JSON.stringify(_ssNames.slice(0, _ssCount)));
    clearSnapshot(); // starting fresh clears any saved game
    hideSessionSetup(); sessionInit(_ssCount, _ssNames.slice(0, _ssCount)); enterSelection();
});

// ── TOUCH & MOUSE HANDLERS ──
dice.addEventListener('touchstart', e => {
    if (ritualOverlay.classList.contains('visible')) return;
    diceTouchStartTime = Date.now(); diceTouchStartX = e.touches[0].clientX; diceTouchStartY = e.touches[0].clientY;
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => {
        longPressFiredAt = Date.now();
        if (selectionActive) confirmMode();
        else if (currentMode && !statsOverlay.classList.contains('visible')) showStats();
        else if (!currentMode) enterSelection();
    }, LONG_PRESS_MS);
}, { passive: true });

dice.addEventListener('touchend', e => {
    if (ritualOverlay.classList.contains('visible')) return;
    const fired = Date.now() - longPressFiredAt < 120; clearTimeout(longPressTimer); if (fired) return;
    const dt = Date.now() - diceTouchStartTime, dx = e.changedTouches[0].clientX - diceTouchStartX;
    if (dt > 500) return;
    if (selectionActive) { if (Math.abs(dx) > 22) cycleMode(dx < 0 ? 1 : -1); else cycleMode(1); }
    else if (!currentMode) enterSelection();
    else if (!isRolling && !statsOverlay.classList.contains('visible')) roll();
}, { passive: true });

dice.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - diceTouchStartX, dy = e.touches[0].clientY - diceTouchStartY;
    if (Math.hypot(dx, dy) > 10) clearTimeout(longPressTimer);
}, { passive: true });

// Mouse support
let _mouseDownTime = 0, _mouseDownX = 0, _mouseLongPress = null, _mouseLongFiredAt = 0;
dice.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (ritualOverlay.classList.contains('visible')) return;
    _mouseDownTime = Date.now(); _mouseDownX = e.clientX;
    _mouseLongPress = setTimeout(() => {
        _mouseLongFiredAt = Date.now();
        if (selectionActive) confirmMode();
        else if (currentMode && !statsOverlay.classList.contains('visible')) showStats();
        else if (!currentMode) enterSelection();
    }, LONG_PRESS_MS);
});
dice.addEventListener('mouseup', e => {
    if (e.button !== 0) return;
    if (ritualOverlay.classList.contains('visible')) return;
    const fired = Date.now() - _mouseLongFiredAt < 150;
    clearTimeout(_mouseLongPress);
    if (fired) return;
    const dt = Date.now() - _mouseDownTime; if (dt > 500) return;
    if (selectionActive) { cycleMode(1); }
    else if (!currentMode) enterSelection();
    else if (!isRolling && !statsOverlay.classList.contains('visible')) roll();
});
dice.addEventListener('mousemove', e => { if (Math.abs(e.clientX - _mouseDownX) > 10) clearTimeout(_mouseLongPress); });

document.body.addEventListener('touchstart', e => {
    if (e.target.closest('#dice,#ritualOverlay,#statsOverlay,#suboptsPanel,#sessionSetup,#specialGallery')) return;
    if (selectionActive || !currentMode) return;
    if (statsOverlay.classList.contains('visible')) return;
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => { longPressFiredAt = Date.now(); showStats(); }, LONG_PRESS_MS);
}, { passive: true });
document.body.addEventListener('touchend', e => { if (!e.target.closest('#dice')) clearTimeout(longPressTimer); }, { passive: true });
document.body.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });

document.body.addEventListener('click', e => {
    if (Date.now() - longPressFiredAt < 120) return;
    if (dice.contains(e.target)) return;
    if (e.target.closest('#statsOverlay,#ritualOverlay,#suboptsPanel,#sessionSetup,#specialGallery')) return;
    if (statsOverlay.classList.contains('visible') || selectionActive || !currentMode || isRolling) return;
    roll();
});


// ────────────────────────────────────────────────────────
// js/init.js
// ────────────────────────────────────────────────────────
// Flush any queued analytics from previous sessions
flushAnalyticsQueue();
applyGrad(GRAD_NEUTRAL);
showDots(6);
ambientLoop();
window.addEventListener('resize', () => { if (rollHistory.length) renderHistory(false); });
showSessionSetup();

</script>
