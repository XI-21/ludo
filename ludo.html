        // ── BASE64 DECODE HELPER ──
        function decodeBase64ToArrayBuffer(dataUrl) {
            const b64 = dataUrl.split(',')[1];
            const bin = atob(b64);
            const buf = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
            return buf.buffer.slice(0);
        }

        // ── CORE TONE / NOISE ──
        function tone(type, freq, freqEnd, vol, dur, startAt) {
            if (!audioCtx) return;
            const at = startAt || 0;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain(), t = audioCtx.currentTime + at;
            o.type = type; o.frequency.setValueAtTime(freq, t);
            if (freqEnd) o.frequency.linearRampToValueAtTime(freqEnd, t + dur * 0.55);
            g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + dur);
        }

        let noiseBuffer = null;
        function initNoiseBuffer() {
            if (!audioCtx) return;
            const len = Math.ceil(audioCtx.sampleRate * 0.1);
            noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
            const d = noiseBuffer.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        }
        initNoiseBuffer();

        function noise(vol, dur) {
            if (!audioCtx || !noiseBuffer) return;
            const src = audioCtx.createBufferSource(), g = audioCtx.createGain();
            src.buffer = noiseBuffer; g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            src.connect(g); g.connect(audioCtx.destination); src.start();
        }

        // ── SFX ──
        function sfx1() { tone('sine', 180, 90, 0.28, 0.30, 0); noise(0.07, 0.07); }
        function sfx2() { tone('triangle', 310, null, 0.18, 0.14, 0); tone('triangle', 300, null, 0.16, 0.14, 0.12); }
        function sfx3() { tone('triangle', 430, null, 0.20, 0.18, 0); }
        function sfx4() { tone('triangle', 460, 570, 0.22, 0.22, 0); }
        function sfx5() { tone('sine', 523, null, 0.19, 0.18, 0); tone('sine', 698, null, 0.22, 0.26, 0.14); }
        function sfx6() { [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => tone('sine', f, null, 0.22, 0.6, i * 0.1)); }
        function sfxTritone(root) { const tri = root * Math.pow(2, 6 / 12); tone('sine', root, null, 0.20, 0.55, 0); tone('sine', tri, null, 0.16, 0.50, 0.05); }
        function sfxCursed1() { tone('square', 100, 85, 0.22, 0.9, 0); tone('sine', 200, null, 0.10, 1.1, 0); noise(0.04, 0.06); }
        const CURSED_SFX = { 1: sfxCursed1, 2: () => sfxTritone(160), 3: () => sfxTritone(200), 4: () => sfxTritone(240), 5: () => sfxTritone(280), 6: sfx6 };

        function playSFX(n) {
            if (!feedbackOn) return;

                const p = a + Math.PI / 2;

                const b1x = cx + Math.cos(a) * baseR + Math.cos(p) * hw, b1y = cy + Math.sin(a) * baseR + Math.sin(p) * hw;
                const b2x = cx + Math.cos(a) * baseR - Math.cos(p) * hw, b2y = cy + Math.sin(a) * baseR - Math.sin(p) * hw;
                parts.push(`<polygon points="${tx.toFixed(1)},${ty.toFixed(1)} ${b1x.toFixed(1)},${b1y.toFixed(1)} ${b2x.toFixed(1)},${b2y.toFixed(1)}" opacity="${op}"/>`);

<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>

                    deck.push(card); suits.push(4);
                } else {
                    for (let s = 0; s < 4; s++) {
                        deck.push(card); suits.push(s);
                    }
                }
            });
            // Fisher-Yates with parallel suit array
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
                [suits[i], suits[j]] = [suits[j], suits[i]];
            }
            jackDeckSuits = suits;
            return deck;
        }

        let jackDeck = [];
        let jackDrawn = 0;

        function jackReset() {
            jackDeck = buildJackDeck();
            jackDrawn = 0;
            updateJackCounter();
        }

        function jackDraw() {
            if (jackDrawn >= jackDeck.length) {
                jackDeck = buildJackDeck();
                jackDrawn = 0;
                playReshuffleSound();
                showAnnounce('✦ DECK RESHUFFLED', 'rgba(200,200,200,0.8)', 3000);
                // Brief card-back flash on die
                dice.classList.add('jackaroo-reshuffle');
                setTimeout(() => dice.classList.remove('jackaroo-reshuffle'), 700);
            }
            const card = jackDeck[jackDrawn];
            const suitIdx = jackDeckSuits[jackDrawn];
            jackDrawn++;
            updateJackCounter();
            const suit = suitIdx === 4 ? JACK_JOKER_SUIT : JACK_SUITS[suitIdx];
            return { ...card, suit };
        }

        function updateJackCounter() {
            const remaining = jackDeck.length - jackDrawn;
            rollCounterEl.style.opacity = '1';
            rollCounterEl.style.color = 'rgba(180,140,80,0.65)';
            rollCounterEl.textContent = `${remaining} card${remaining === 1 ? '' : 's'} left`;
        }

        // ── CARD SOUNDS ──
        function playCardSound(rank) {
            if (!feedbackOn || !audioCtx) return;
            if (rank === 'J') {
                // Jack: sharp percussive thwack
                tone('square', 220, 80, 0.25, 0.18, 0);
                tone('sine', 160, null, 0.12, 0.25, 0.02);
            } else if (rank === '🃏') {
                // Joker: wild ascending shimmer
                [520, 720, 960, 1200].forEach((f, i) => tone('sine', f, null, 0.14, 0.3, i * 0.06));
            } else if (rank === 'Q') {
                // Queen: bright double-tap
                tone('triangle', 660, null, 0.18, 0.14, 0);
                tone('triangle', 880, null, 0.14, 0.18, 0.1);
            } else if (rank === 'K' || rank === 'A') {
                // King/Ace: resonant low thud with overtone
                tone('sine', 180, null, 0.22, 0.35, 0);
                tone('triangle', 360, null, 0.12, 0.25, 0.05);
            } else if (rank === '7') {
                // 7 split: two quick rising tones
                tone('triangle', 440, 600, 0.16, 0.22, 0);
                tone('triangle', 500, 700, 0.12, 0.20, 0.12);
            } else if (rank === '8') {
                // 8 backward: descending thud
                tone('sine', 300, 120, 0.20, 0.35, 0);
                tone('sawtooth', 200, 80, 0.08, 0.30, 0.05);
            } else {
                // Number cards: clean percussive click, pitch varies by value
                const v = parseInt(rank) || 5;
                tone('triangle', 280 + v * 30, null, 0.14, 0.12, 0);
            }
        }

        function playReshuffleSound() {
            if (!feedbackOn || !audioCtx) return;
            // 5 staggered card-riffle noise bursts, slightly different each
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const dur = 0.035 + Math.random() * 0.02;
                    const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
                    const d = buf.getChannelData(0);
                    for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / d.length, 2);
                    const src = audioCtx.createBufferSource();
                    const g = audioCtx.createGain();
                    const f = audioCtx.createBiquadFilter();
                    f.type = 'bandpass';
                    f.frequency.value = 1800 + Math.random() * 1400;
                    f.Q.value = 1.2;
                    src.buffer = buf;
                    g.gain.setValueAtTime(0.28, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur + 0.02);
                    src.connect(f); f.connect(g); g.connect(audioCtx.destination);
                    src.start();
                }, i * 60 + Math.random() * 20);
            }
        }

        // ── CARD FACE DISPLAY ──
        function showCardFace(card) {
            showBlank();
            const suit = card.suit || JACK_SUITS[0];

            // Apply suit color to die background
            dice.style.backgroundColor = suit.bg;

            // Rank overlay on die face — no watermark inside die
            let overlay = document.getElementById('cardRankOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'cardRankOverlay';
                overlay.className = 'card-rank-overlay';
                dice.appendChild(overlay);
            }
            overlay.textContent = card.rank;
            overlay.style.color = suit.text;
            overlay.style.opacity = '1';
        }

        function hideCardFace() {
            const overlay = document.getElementById('cardRankOverlay');
            if (overlay) overlay.style.opacity = '0';
            dice.style.borderRadius = ''; // restore dice radius
            dice.style.boxShadow = '';
        }

        // ── SUIT SHOCKWAVE ──
        // Replaces the border-ring shockwave with an expanding suit symbol
        function fireSuitShockwave(suit) {
            let el = document.getElementById('suitShockwave');
            if (!el) {
                el = document.createElement('div');
                el.id = 'suitShockwave';
                el.className = 'suit-shockwave';
                // Insert into dice-wrapper
                document.querySelector('.dice-wrapper').appendChild(el);
            }
            el.textContent = suit.sym;
            el.style.color = suit.accent;
            el.classList.remove('fire');
            void el.offsetWidth;
            el.classList.add('fire');
        }

        // ── CARD ANNOUNCEMENT TEXT ──
        function getCardAnnounce(card) {
            if (typeof card.announce === 'function') return card.announce(card.rank);
            return card.announce;
        }


        // ────────────────────────────────────────────────────────
        // js/roll.js
        // ────────────────────────────────────────────────────────
        function checkSpecialDie(mode) {
            if (mode.jackaroo) return null;
            if (!getModeOpt(mode.id, 'specialDice', true)) return null;
            if (Math.random() > SPECIAL_DICE_CHANCE) return null;
            const pool = GLOBAL_SPECIAL_PACK.filter(e => isDiceEnabled(e.id));
            if (!pool.length) return null;
            const total = pool.reduce((a, b) => a + b.w, 0);
            let r = Math.random() * total;
            for (const entry of pool) {
                r -= entry.w;
                if (r < 0) return SPECIAL_DICE[entry.id] || null;
            }
            return null;
        }


        function roll() {
            if (!currentMode || isRolling) return;
            if (ritualPending !== null || foolPending !== null) return;
            isRolling = true;
            snapAmbientSpeed();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            stopChoirAll(100); // fast fade when re-rolling
            if (isSixShowing) hideHalo();
            hideCardFace();
            dice.classList.remove(
                'idle', 'squish-heavy', 'squish-normal', 'squish-bounce', 'squish-freeze',
                'divine-shine', 'windup', 'rolling',
                'die-seven', 'die-ghost', 'die-taxman', 'die-rewind', 'die-frozen', 'die-switch', 'die-multiplier'
            );
            void dice.offsetWidth;
            dice.style.boxShadow = ''; dice.style.animation = ''; dice.style.filter = '';
            dice.style.borderRadius = '';
            numberLabel.classList.remove('visible');
            streakPill.classList.remove('deflating');
            streakPill.style.opacity = '0';
            dice.classList.add('windup');
            setTimeout(() => {
                dice.classList.remove('windup'); void dice.offsetWidth;
                dice.classList.add('rolling');
                if (currentMode.jackaroo) startJackLoop();
                else startRollLoop();
            }, 85);
        }

        // ── JACKAROO ROLL LOOP ──
        function startJackLoop() {
            const mode = currentMode;
            const { durMult, intMult } = getRollSpeedFactors(mode);
            const dur = mode.duration() * durMult, startTime = Date.now();
            const baseInt = mode.baseInterval * intMult;
            function tick() {
                const elapsed = Date.now() - startTime, remaining = dur - elapsed;
                if (remaining <= 0) { finishJack(); return; }
                playRollTick(300 + Math.random() * 200, .07);
                showDots(Math.floor(Math.random() * 6) + 1);
                dice.style.backgroundColor = rollColors[Math.floor(Math.random() * 4)];
                const delay = mode.slowdown && remaining < 400 ? baseInt + (1 - remaining / 400) * 80 : baseInt;
                rollTimeout = setTimeout(tick, delay);
            }
            tick();
        }

        function finishJack() {
            dice.classList.remove('rolling');
            const card = jackDraw();
            const suit = card.suit;

            const isDramatic = card.rank === 'J' || card.rank === '🃏' || card.rank === 'Q' || card.rank === 'K' || card.rank === 'A';
            const squishClass = isDramatic ? 'squish-bounce' : card.value <= 2 ? 'squish-heavy' : 'squish-normal';

            dice.classList.add(squishClass);
            showCardFace(card);

            const numVal = Math.min(Math.max(card.value || 1, 1), 6);
            sessionRolls[numVal - 1]++;
            recentRollsGlobal.push(numVal); if (recentRollsGlobal.length > 8) recentRollsGlobal.shift();
            SESSION._pendingResult = numVal;
            updateJackCounter();
            updateGradFromSession();

            if (SESSION.active) {
                const p = SESSION.players[SESSION.currentIndex];
                if (p) { p.rollCount++; if (!p.rolls) p.rolls = [0, 0, 0, 0, 0, 0]; p.rolls[numVal - 1]++; }
            }

            lastRollTimestamp = Date.now();
            incrementCounter();

            // Periodic analytics every 10 rolls
            if (totalRolls % 10 === 0) sendAnalytics('periodic');

            const ann = getCardAnnounce(card);
            const annDuration = (card.isSpecial || isDramatic) ? 5500 : 3800;
            showAnnounce(ann, card.announcementColor || suit.text + 'ff', annDuration);

            playCardSound(card.rank);
            fireSuitShockwave(suit);

            if (isDramatic && card.rank !== 'A' && card.rank !== 'K') {
                fireEdgeFlash({ edge: suit.accent + '28' });
                setAmbient(suit.bg);
                fireConfetti([suit.accent, suit.text, '#ffffff'], false);
            } else {
                setAmbient(null);
            }

            const showLabel = card.isSpecial || ['A', 'J', 'Q', 'K', '🃏', '7', '8', '9', '10'].includes(card.rank);
            updateHistory({
                num: numVal,
                bgColor: suit.bg,
                label: showLabel ? card.rank : null,
                labelColor: suit.text,
                dotColor: showLabel ? null : suit.text,
            });

            setTimeout(() => {
                isRolling = false;
                dice.classList.remove(squishClass);
                void dice.offsetWidth;
                dice.classList.add('idle');
                setAmbient(null);
                setTimeout(slowAmbientGradually, 800);
                if (SESSION.active) {
                    SESSION.lastRolls[SESSION.currentIndex] = SESSION._pendingResult;
                    advanceTurn();
                }
                saveSnapshot();
            }, SQUISH_END_MS);
        }

        // ── STANDARD ROLL LOOP ──
        function getRollSpeedFactors(mode) {
            const s = getModeOpt(mode.id, 'rollSpeed', 1);
            if (s === 0) return { durMult: 1.4, intMult: 1.5 };
            if (s === 2) return { durMult: 0.65, intMult: 0.55 };
            return { durMult: 1.0, intMult: 1.0 };
        }
        function startRollLoop() {
            const mode = currentMode;
            const { durMult, intMult } = getRollSpeedFactors(mode);
            const dur = mode.duration() * durMult, startTime = Date.now();
            const baseInt = mode.baseInterval * intMult;
            function tick() {
                const elapsed = Date.now() - startTime, remaining = dur - elapsed;
                if (remaining <= 0) { doClatter(); return; }
                const frac = Math.min(elapsed / dur, 1);
                const freq = mode.cursed ? (500 - frac * 260) : (300 + frac * 500);
                playRollTick(freq, .08);
                showDots(Math.floor(Math.random() * 6) + 1);
                dice.style.backgroundColor = rollColors[Math.floor(Math.random() * 4)];
                const delay = mode.slowdown && remaining < 400 ? baseInt + (1 - remaining / 400) * 80 : baseInt;
                rollTimeout = setTimeout(tick, delay);
            }
            tick();
        }

        function doClatter() {
            let c = 0;
            function cl() {
                if (c >= 3) { finishRoll(); return; }
                showDots(Math.floor(Math.random() * 6) + 1);
                dice.style.backgroundColor = rollColors[Math.floor(Math.random() * 4)];
                c++; setTimeout(cl, 55);
            }
            cl();
        }

        function finishRoll() {
            const weights = currentMode.weights || [8, 12, 20, 22, 20, 18];

            let result = weightedRoll(weights);
            const squishClass = result <= 2 ? 'squish-heavy' : result === 6 || result === 7 ? 'squish-bounce' : 'squish-normal';
            dice.classList.remove('rolling');
            dice.style.animationDirection = '';
            const special = checkSpecialDie(currentMode);

            // ── RITUAL MODE ──
            if (currentMode.ritual) {
                const finalResult = special
                    ? (typeof special.resultFn === 'function' ? special.resultFn(result) : result)
                    : result;
                if (special) {
                    const ann = special.delayedReveal
                        ? (typeof special.announcement === 'function' ? special.announcement(result) : special.announcement)
                        : special.label;
                    showAnnounce(ann, special.announcementColor);
                    if (feedbackOn && special.sfxFn) special.sfxFn();
                }
                commitResult(finalResult, special);
                showBlank();
                dice.classList.add(squishClass);
                dice.style.backgroundColor = rollColors[Math.floor(Math.random() * 4)];
                fireShockwave(null, false);
                ritualPending = { result: finalResult, special: special || null };
                const waitMs = getModeOpt('ritual', 'revealDelay', false) ? 1400 : 0;
                setTimeout(() => {
                    dice.classList.remove(squishClass);
                    void dice.offsetWidth;
                    ritualOverlay.classList.add('visible');
                    isRolling = false;
                    dice.classList.add('idle');
                }, 620 + waitMs);
                return;
            }

            // ── GLITCH REWORK ──
            // Show a completely normal-looking result (1–5), then corrupt to 6
            if (special?.glitchReveal) {
                const fakeN = Math.floor(Math.random() * 5) + 1;
                SPECIAL_DICE.glitch._fakeN = fakeN;

                // Show as a totally normal roll — random color, normal dots, no special treatment
                showDots(fakeN);
                dice.style.backgroundColor = rollColors[Math.floor(Math.random() * 4)];
                dice.classList.add('squish-normal');
                fireShockwave('rgba(255,255,255,0.3)', false);
                showNumber(fakeN, null);
                playSFX(Math.min(fakeN, 5));

                // Randomize delay so experienced players can't time it
                const glitchDelay = 1300 + Math.random() * 800;

                setTimeout(() => {
                    dice.classList.remove('squish-normal');
                    dice.classList.add('glitching');
                    if (feedbackOn) playRollTick(180, .12);

                    setTimeout(() => {
                        dice.classList.remove('glitching');
                        const finalResult = special.resultFn(result); // always 6
                        commitResult(finalResult, special);

                        // Announcement fires NOW — after the corruption, referencing the fake number
                        const annText = typeof special.announcement === 'function'
                            ? special.announcement()
                            : special.announcement;
                        showAnnounce(annText, special.announcementColor);

                        resolveResult(finalResult, 'squish-bounce', special);
                    }, 560);
                }, glitchDelay);
                return;
            }

            if (special) { resolveSpecialDie(special, result, squishClass); return; }
            commitResult(result, null);
            resolveResult(result, squishClass, null);
        }

        function commitResult(result, special) {
            SESSION._pendingResult = result;
            const clamped = Math.min(result, 6);
            if (clamped >= 1 && clamped <= 6) sessionRolls[clamped - 1]++;
            if (SESSION.active) {
                const p = SESSION.players[SESSION.currentIndex];
                if (p) {
                    p.rollCount++;
                    if (!p.rolls) p.rolls = [0, 0, 0, 0, 0, 0];
                    p.rolls[Math.max(0, clamped - 1)]++;
                    if (result === 6 || result === 7) { p.sixCount++; p._rollsSinceLastSix = 0; }
                    else { p._rollsSinceLastSix = (p._rollsSinceLastSix || 0) + 1; }
                    // Track special die appearances per player
                    if (special) {
                        if (!p.specialHistory) p.specialHistory = [];
                        p.specialHistory.push({
                            die: special.id,
                            result: result,
                            rollNumber: p.rollCount,
                        });
                    }
                }
            }
            recentRollsGlobal.push(result); if (recentRollsGlobal.length > 8) recentRollsGlobal.shift();
            lastRollTimestamp = Date.now();
            incrementCounter();
            updateGradFromSession();
            if (currentMode.cursed && result !== 6) decreaseCursedSaturation();
            else if (result === 6 || result === 7) resetCursedSaturation();

            // Periodic analytics every 10 rolls
            if (totalRolls % 10 === 0 && totalRolls > 0) sendAnalytics('periodic');
        }

        function resolveResult(result, squishClass, special) {
            if (!squishClass) squishClass = result <= 2 ? 'squish-heavy' : result === 6 || result === 7 ? 'squish-bounce' : 'squish-normal';

            const is6 = (result === 6 || result === 7);
            // Compute rollsAgain from mode option (defaults true)
            const rollsAgain = is6 && getModeOpt(currentMode.id, 'rollsAgain', true);

            // Apply special die visual classes
            if (special?.keepDiamond) dice.classList.add('die-seven');
            if (special?.id === 'ghost') { dice.classList.add('die-ghost'); dice.style.borderRadius = '45px'; }
            if (special?.sharpCorners) { dice.classList.add('die-taxman'); dice.style.borderRadius = '18px'; }
            if (special?.frozenDots) dice.classList.add('die-frozen');
            if (special?.splitColor) dice.classList.add('die-switch');
            if (special?.id === 'multiplier') dice.classList.add('die-multiplier');

            const actualSquish = special?.id === 'frozen' ? 'squish-freeze' : squishClass;
            dice.classList.add(actualSquish);

            if (is6) {
                const theme = pickTheme(currentMode.id);
                const diceColor = special?.keepColor ? special.color : theme.diceColor;
                dice.classList.add('divine-shine');
                dice.style.backgroundColor = diceColor;
                showDots(result === 7 ? 7 : 6);
                if (special?.keepDiamond) dice.classList.add('die-seven');
                dice.style.setProperty('--theme-glow', theme.themeGlow);
                showHalo(theme);
                fireShockwave(theme.shock, !special?.doubleCelebration);
                showNumber(result === 7 ? '7' : 6, theme);
                updateStreak(true, theme);
                setAmbient(theme.ambient);
                updateHistory({
                    num: result,
                    bgColor: diceColor,
                    dotPattern: special?.keepDiamond ? [1, 2, 3, 5, 7, 8, 9] : null,
                    dotColor: special?.historyDotColor || null,
                    dotShape: special?.historyDotShape || null,
                    borderRadius: special?.historyBorderRadius || null,
                });
                pulseGradToTheme(theme, 3500);
                fireEdgeFlash(theme);
                if (result === 7 && special?.rainbowEdge) setTimeout(fireRainbowEdge, 200);
                const extraConf = currentMode.id === 'lucky' && getModeOpt('lucky', 'extraConfetti', true);
                fireConfetti(special?.confetti || theme.confetti, extraConf || special?.doubleCelebration);
                if (special?.doubleCelebration) fireShockwave(theme.shock, true);
                if ((special?.chorMod || 'normal') !== 'silence') setTimeout(() => playChoirForSix(theme, currentMode), 420);
                playSFX(6);
                if (special?.sfxFn && !currentMode.ritual) setTimeout(() => { if (feedbackOn) special.sfxFn(); }, 100);

                setTimeout(() => {
                    isRolling = false;
                    dice.classList.remove(actualSquish);
                    void dice.offsetWidth;
                    if (!isSixShowing) dice.classList.add('idle');
                    setTimeout(slowAmbientGradually, 800);
                    if (SESSION.active) {
                        if (rollsAgain) {
                            // Stay on current player — roll again
                            setChainEdge(SESSION.currentIndex);
                            saveSnapshot();
                        } else {
                            SESSION.lastRolls[SESSION.currentIndex] = SESSION._pendingResult;
                            setChainEdge(SESSION.currentIndex);
                            setTimeout(() => {
                                if (SESSION.active) advanceTurn();
                                saveSnapshot();
                            }, 900);
                        }
                    }
                }, SQUISH_END_MS);
            } else {
                const diceColor = special?.color || rollColors[Math.floor(Math.random() * 4)];
                dice.style.backgroundColor = diceColor;

                if (result === 7) {
                    dice.style.backgroundColor = special?.color || '#f0f0ff'; showDots(7);
                } else {
                    const pat = special?.getDotPattern ? special.getDotPattern()
                        : special?.dotPattern ? special.dotPattern
                            : null;
                    if (pat) {
                        for (let i = 1; i <= 9; i++) {
                            const el = document.getElementById(`dot-${i}`);
                            const lit = pat.includes(i);
                            el.style.opacity = lit ? (special.frozenDots ? '0.15' : '1') : '0';
                            el.style.background = '';
                            el.style.borderRadius = '';
                            el.style.transform = '';
                        }
                    } else {
                        showDots(Math.max(result, 1));
                    }
                }

                fireShockwave(special?.id === 'frozen' ? null : 'rgba(255,255,255,0.3)', false);
                if (result > 0) showNumber(result, null);
                updateStreak(false, null);
                setAmbient(null);
                const histPattern = special?.getDotPattern ? special.getDotPattern()
                    : special?.dotPattern ? special.dotPattern : null;
                updateHistory({
                    num: Math.max(result, 1),
                    bgColor: diceColor,
                    dotPattern: histPattern,
                    dotColor: special?.historyDotColor || null,
                    dotShape: special?.historyDotShape || null,
                    borderRadius: special?.historyBorderRadius || null,
                });
                if (result > 0) playSFX(Math.min(result, 6));
                if (special?.sfxFn && !currentMode.ritual) setTimeout(() => { if (feedbackOn) special.sfxFn(); }, 50);

                const endDelay = special?.id === 'frozen' ? SQUISH_END_MS + 200 : SQUISH_END_MS;
                setTimeout(() => {
                    isRolling = false;
                    dice.classList.remove(actualSquish);
                    void dice.offsetWidth;
                    dice.classList.add('idle');
                    setTimeout(slowAmbientGradually, 800);
                    if (SESSION.active) {
                        SESSION.lastRolls[SESSION.currentIndex] = SESSION._pendingResult;
                        advanceTurn();
                    }
                    saveSnapshot();
                }, endDelay);
            }
        }

        function resolveSpecialDie(special, originalResult, squishClass) {
            const finalResult = typeof special.resultFn === 'function' ? special.resultFn(originalResult) : originalResult;
            commitResult(finalResult, special);

            if (special.delayedReveal) {
                showBlank();
                dice.classList.add(squishClass);
                showAnnounce(
                    typeof special.announcement === 'function' ? special.announcement(originalResult) : (special.announcement || special.label),
                    special.announcementColor
                );
                if (feedbackOn && special.sfxFn) special.sfxFn();
                dice.style.backgroundColor = special.galleryColor || special.color || rollColors[0];
                fireShockwave(null, false);
                setTimeout(() => {
                    dice.classList.remove(squishClass);
                    void dice.offsetWidth;
                    foolPending = { result: finalResult, special, squishClass: null };
                    const rSym = document.querySelector('.ritual-symbol');
                    if (rSym) { rSym.textContent = '?'; rSym.style.fontSize = '36px'; }
                    ritualOverlay.classList.add('visible');
                    isRolling = false;
                    dice.classList.add('idle');
                }, 620);
                return;
            }

            if (special.id === 'rewind') dice.classList.add('die-rewind');

            const annText = typeof special.announcement === 'function' ? special.announcement(originalResult) : (special.announcement || special.label);
            showAnnounce(annText, special.announcementColor);
            if (feedbackOn && special.sfxFn) special.sfxFn();
            resolveResult(finalResult, squishClass, special);
        }


        // ────────────────────────────────────────────────────────
        // js/ui.js
        // ────────────────────────────────────────────────────────
        let _statsTab = 0;

        // ── FEEDBACK ──
        function syncMuteIcon() { statsMuteIcon.textContent = feedbackOn ? '🔊' : '🔇'; }

        function _buildContinueBlock(snap) {
            const mode = MODES[snap.modeId];
            const names = snap.players.map(p => p.name).join(', ');
            const minsAgo = Math.round((Date.now() - snap.ts) / 60000);
            const timeStr = minsAgo < 1 ? 'just now' : `${minsAgo}m ago`;

    `;

            const orRow = document.createElement('div');
            orRow.className = 'ss-or-row';
            orRow.textContent = '— or start fresh —';

            block.appendChild(btn);
            block.appendChild(orRow);

            // Insert before the Begin button
            const ssBegin = document.getElementById('ssBegin');
            sessionSetup.insertBefore(block, ssBegin);

            btn.addEventListener('click', () => {
                hideSessionSetup();
                restoreSnapshot(snap);
                const modeObj = MODES[snap.modeId];
                if (!modeObj) { enterSelection(); return; }
                currentMode = modeObj;
                _setupModeVisuals(modeObj, true /* resumed */);
                if (modeObj.jackaroo) {

        dice.addEventListener('touchstart', e => {
            if (ritualOverlay.classList.contains('visible')) return;
            diceTouchStartTime = Date.now(); diceTouchStartX = e.touches[0].clientX; diceTouchStartY = e.touches[0].clientY;
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                longPressFiredAt = Date.now();
                if (selectionActive) confirmMode();
                else if (currentMode && !statsOverlay.classList.contains('visible')) showStats();
                else if (!currentMode) enterSelection();
            }, LONG_PRESS_MS);
        }, { passive: true });

        dice.addEventListener('touchend', e => {
            if (ritualOverlay.classList.contains('visible')) return;
            const fired = Date.now() - longPressFiredAt < 120; clearTimeout(longPressTimer); if (fired) return;
            const dt = Date.now() - diceTouchStartTime, dx = e.changedTouches[0].clientX - diceTouchStartX;
            if (dt > 500) return;
            if (selectionActive) { if (Math.abs(dx) > 22) cycleMode(dx < 0 ? 1 : -1); else cycleMode(1); }
            else if (!currentMode) enterSelection();
            else if (!isRolling && !statsOverlay.classList.contains('visible')) roll();
        }, { passive: true });

        dice.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - diceTouchStartX, dy = e.touches[0].clientY - diceTouchStartY;
            if (Math.hypot(dx, dy) > 10) clearTimeout(longPressTimer);
        }, { passive: true });

        // Mouse support
        let _mouseDownTime = 0, _mouseDownX = 0, _mouseLongPress = null, _mouseLongFiredAt = 0;
        dice.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            if (ritualOverlay.classList.contains('visible')) return;
            _mouseDownTime = Date.now(); _mouseDownX = e.clientX;
            _mouseLongPress = setTimeout(() => {
                _mouseLongFiredAt = Date.now();
                if (selectionActive) confirmMode();
                else if (currentMode && !statsOverlay.classList.contains('visible')) showStats();
                else if (!currentMode) enterSelection();
            }, LONG_PRESS_MS);
        });
        dice.addEventListener('mouseup', e => {
            if (e.button !== 0) return;
            if (ritualOverlay.classList.contains('visible')) return;
            const fired = Date.now() - _mouseLongFiredAt < 150;
            clearTimeout(_mouseLongPress);
            if (fired) return;
            const dt = Date.now() - _mouseDownTime; if (dt > 500) return;
            if (selectionActive) { cycleMode(1); }
            else if (!currentMode) enterSelection();
            else if (!isRolling && !statsOverlay.classList.contains('visible')) roll();
        });
        dice.addEventListener('mousemove', e => { if (Math.abs(e.clientX - _mouseDownX) > 10) clearTimeout(_mouseLongPress); });

        document.body.addEventListener('touchstart', e => {
            if (e.target.closest('#dice,#ritualOverlay,#statsOverlay,#suboptsPanel,#sessionSetup,#specialGallery')) return;
            if (selectionActive || !currentMode) return;
            if (statsOverlay.classList.contains('visible')) return;
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => { longPressFiredAt = Date.now(); showStats(); }, LONG_PRESS_MS);
        }, { passive: true });
        document.body.addEventListener('touchend', e => { if (!e.target.closest('#dice')) clearTimeout(longPressTimer); }, { passive: true });
        document.body.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });

        document.body.addEventListener('click', e => {
            if (Date.now() - longPressFiredAt < 120) return;
            if (dice.contains(e.target)) return;
            if (e.target.closest('#statsOverlay,#ritualOverlay,#suboptsPanel,#sessionSetup,#specialGallery')) return;
            if (statsOverlay.classList.contains('visible') || selectionActive || !currentMode || isRolling) return;
            roll();
        });


        // ────────────────────────────────────────────────────────
        // js/init.js
        // ────────────────────────────────────────────────────────
        // Flush any queued analytics from previous sessions
        flushAnalyticsQueue();
        applyGrad(GRAD_NEUTRAL);
        showDots(6);
        ambientLoop();
        window.addEventListener('resize', () => { if (rollHistory.length) renderHistory(false); });
        showSessionSetup();

    </script>
</body>

</html>
